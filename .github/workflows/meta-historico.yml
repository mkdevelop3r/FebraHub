# FebraHub · .github/workflows/meta-historico.yml
#
# Carga histórica do Meta Ads (2024 em diante). Roda só manualmente,
# pelo botão Run workflow. Depois de rodar uma vez, o sync diário
# (no sync-diario.yml) mantém atualizado.
#
# Secrets necessários:
#   META_TOKEN, META_ACCOUNT_ID, SUPABASE_URL, SUPABASE_SERVICE_KEY

name: Meta Ads — carga histórica

on:
  workflow_dispatch:
    inputs:
      desde:
        description: 'Data inicial (AAAA-MM-DD)'
        required: true
        default: '2024-01-01'
      ate:
        description: 'Data final (AAAA-MM-DD)'
        required: true
        default: '2024-06-30'

jobs:
  historico:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Carga histórica Meta
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
          META_ACCOUNT_ID: ${{ secrets.META_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python etl/meta_sync.py --desde ${{ github.event.inputs.desde }} --ate ${{ github.event.inputs.ate }}
