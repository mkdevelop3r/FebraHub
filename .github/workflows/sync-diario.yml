# FebraHub · .github/workflows/sync-diario.yml
#
# Roda os ETLs todo dia às 06:00 (Salvador) e registra o status no Supabase.
# Gratuito em repositório público.
#
# Secrets já cadastrados em Settings > Secrets and variables > Actions:
#   SUPABASE_URL, SUPABASE_SERVICE_KEY
#   CISPAY_TOKEN, CISPAY_BASE_URL
#   SYMPLA_TOKEN, SYMPLA_BASE_URL
#   CONTAAZUL_CLIENT_ID, CONTAAZUL_CLIENT_SECRET
#
# Os scripts da Conta Azul precisam estar em etl/ para os últimos
# dois passos funcionarem (copiar de Documentos/Meu/Conta azul,
# SEM o arquivo .env).

name: Sync diário

on:
  schedule:
    - cron: '0 9 * * *'      # 09:00 UTC = 06:00 em Salvador
  workflow_dispatch:          # botão para rodar manualmente pelo GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt

      - name: CisPay
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CISPAY_TOKEN: ${{ secrets.CISPAY_TOKEN }}
          CISPAY_BASE_URL: ${{ secrets.CISPAY_BASE_URL }}
        run: python etl/cispay_sync.py
        continue-on-error: true

      - name: Sympla
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SYMPLA_TOKEN: ${{ secrets.SYMPLA_TOKEN }}
          SYMPLA_BASE_URL: ${{ secrets.SYMPLA_BASE_URL }}
        run: python etl/sympla_sync.py
        continue-on-error: true

      - name: Conta Azul — contas a receber
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CONTAAZUL_CLIENT_ID: ${{ secrets.CONTAAZUL_CLIENT_ID }}
          CONTAAZUL_CLIENT_SECRET: ${{ secrets.CONTAAZUL_CLIENT_SECRET }}
        run: python etl/contaazul_sync.py --sync
        continue-on-error: true

      - name: Conta Azul — contas a pagar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CONTAAZUL_CLIENT_ID: ${{ secrets.CONTAAZUL_CLIENT_ID }}
          CONTAAZUL_CLIENT_SECRET: ${{ secrets.CONTAAZUL_CLIENT_SECRET }}
        run: python etl/contaazul_pagar_sync.py --sync
        continue-on-error: true
