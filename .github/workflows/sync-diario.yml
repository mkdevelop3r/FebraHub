# FebraHub · .github/workflows/sync-diario.yml
#
# Roda os ETLs todo dia às 06:00 (Salvador) e registra no Supabase
# quando cada integração sincronizou.
#
# Roda nos servidores do GitHub — não depende de nenhuma máquina.
#   - horário não exato (atrasos de 5 a 30 min são normais)
#   - 60 dias sem commit desativam o agendamento; um commit reativa
#
# Secrets necessários:
#   SUPABASE_URL, SUPABASE_SERVICE_KEY   (service_role, NÃO a anon)
#   CISPAY_TOKEN, CISPAY_BASE_URL
#   SYMPLA_TOKEN, SYMPLA_BASE_URL
#   CONTAAZUL_CLIENT_ID, CONTAAZUL_CLIENT_SECRET
#   META_TOKEN, META_ACCOUNT_ID
#   OMIE_APP_KEY, OMIE_APP_SECRET
#   GOOGLE_SERVICE_ACCOUNT               (JSON inteiro da conta de serviço)
#
# PLANILHAS: todas precisam estar compartilhadas com o client_email da
# conta de serviço, senão o passo falha com 403. São 4:
#   faturamento/metas da loja · cursos premium · aluguel 2025 · aluguel 2026
#   · Sentido de Brincar
#
# ATENÇÃO: o META_TOKEN expira a cada 60 dias. Quando expirar, o passo do
# Meta falha e o investimento para de atualizar. Renovar e recadastrar o
# secret. (definir responsável — ver pauta do marketing)

name: Sync diário

on:
  schedule:
    - cron: '0 9 * * *'      # 09:00 UTC = 06:00 em Salvador
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt

      # ---------------- CisPay ----------------
      - name: CisPay
        id: cispay
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CISPAY_TOKEN: ${{ secrets.CISPAY_TOKEN }}
          CISPAY_BASE_URL: ${{ secrets.CISPAY_BASE_URL }}
        run: python etl/cispay_sync.py
        continue-on-error: true

      - name: Status — CisPay
        if: always()
        run: |
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/integracao_status?on_conflict=fonte" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"fonte\":\"cispay\",\"nome_exibicao\":\"CisPay\",\"ultima_sync\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"status\":\"${{ steps.cispay.outcome == 'success' && 'ok' || 'erro' }}\",\"atualizado_em\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      # ---------------- Sympla ----------------
      - name: Sympla
        id: sympla
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SYMPLA_TOKEN: ${{ secrets.SYMPLA_TOKEN }}
          SYMPLA_BASE_URL: ${{ secrets.SYMPLA_BASE_URL }}
        run: python etl/sympla_sync.py
        continue-on-error: true

      - name: Status — Sympla
        if: always()
        run: |
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/integracao_status?on_conflict=fonte" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"fonte\":\"sympla\",\"nome_exibicao\":\"Sympla\",\"ultima_sync\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"status\":\"${{ steps.sympla.outcome == 'success' && 'ok' || 'erro' }}\",\"atualizado_em\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      # ---------------- Conta Azul ----------------
      - name: Conta Azul — contas a receber
        id: ca_receber
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CONTAAZUL_CLIENT_ID: ${{ secrets.CONTAAZUL_CLIENT_ID }}
          CONTAAZUL_CLIENT_SECRET: ${{ secrets.CONTAAZUL_CLIENT_SECRET }}
        run: python etl/contaazul_sync.py --sync
        continue-on-error: true

      - name: Conta Azul — contas a pagar
        id: ca_pagar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CONTAAZUL_CLIENT_ID: ${{ secrets.CONTAAZUL_CLIENT_ID }}
          CONTAAZUL_CLIENT_SECRET: ${{ secrets.CONTAAZUL_CLIENT_SECRET }}
        run: python etl/contaazul_pagar_sync.py --sync
        continue-on-error: true

      - name: Status — Conta Azul
        if: always()
        run: |
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/integracao_status?on_conflict=fonte" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"fonte\":\"conta_azul\",\"nome_exibicao\":\"Conta Azul\",\"ultima_sync\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"status\":\"${{ steps.ca_receber.outcome == 'success' && steps.ca_pagar.outcome == 'success' && 'ok' || 'parcial' }}\",\"atualizado_em\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      # ---------------- Meta Ads ----------------
      # Puxa só os últimos ~2 meses (padrão do script), rápido e sem rate limit.
      - name: Meta Ads
        id: meta
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          META_TOKEN: ${{ secrets.META_TOKEN }}
          META_ACCOUNT_ID: ${{ secrets.META_ACCOUNT_ID }}
        run: python etl/meta_sync.py
        continue-on-error: true

      - name: Status — Meta Ads
        if: always()
        run: |
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/integracao_status?on_conflict=fonte" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"fonte\":\"meta_ads\",\"nome_exibicao\":\"Meta Ads\",\"ultima_sync\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"status\":\"${{ steps.meta.outcome == 'success' && 'ok' || 'erro' }}\",\"atualizado_em\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      # ---------------- Loja (Omie) ----------------
      # Só o ano corrente; 2025 é histórico fechado e não muda mais.
      # O Omie limita o intervalo de busca — nunca pedir vários anos de uma vez.
      - name: Loja (Omie)
        id: omie
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OMIE_APP_KEY: ${{ secrets.OMIE_APP_KEY }}
          OMIE_APP_SECRET: ${{ secrets.OMIE_APP_SECRET }}
        run: python etl/omie_sync.py --desde 01/01/2026
        continue-on-error: true

      - name: Status — Loja (Omie)
        if: always()
        run: |
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/integracao_status?on_conflict=fonte" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"fonte\":\"omie\",\"nome_exibicao\":\"Loja (Omie)\",\"ultima_sync\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"status\":\"${{ steps.omie.outcome == 'success' && 'ok' || 'erro' }}\",\"atualizado_em\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"

      # ---------------- Planilha da Loja (Google Sheets) ----------------
      # Faturamento por curso + metas mensais. A gestora preenche à mão,
      # então vale sincronizar todo dia para pegar o que ela lançou.
      - name: Planilha da Loja — faturamento por curso
        id: sheets_fat
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python etl/sheets_sync.py
        continue-on-error: true

      - name: Planilha da Loja — metas
        id: sheets_metas
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python etl/sheets_metas_sync.py
        continue-on-error: true

      # Receitas extras da loja: cursos premium, aluguel de sala e
      # Sentido de Brincar. São 3 planilhas diferentes — todas precisam
      # estar compartilhadas com o e-mail da conta de serviço.
      - name: Planilha da Loja — receitas extras
        id: sheets_extras
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python etl/sheets_extras_sync.py
        continue-on-error: true

      - name: Status — Planilha da Loja
        if: always()
        run: |
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/integracao_status?on_conflict=fonte" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"fonte\":\"sheets\",\"nome_exibicao\":\"Planilha da Loja\",\"ultima_sync\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"status\":\"${{ steps.sheets_fat.outcome == 'success' && steps.sheets_metas.outcome == 'success' && steps.sheets_extras.outcome == 'success' && 'ok' || 'parcial' }}\",\"atualizado_em\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
