# FebraHub · .github/workflows/sync-diario.yml
#
# Roda os ETLs todo dia e registra o status no Supabase.
# Gratuito em repositório público.
#
# Antes de funcionar, cadastre os secrets em:
#   GitHub > repositório > Settings > Secrets and variables > Actions
#
#   SUPABASE_URL           https://bcorkfhfjfurlvggzgco.supabase.co
#   SUPABASE_SERVICE_KEY   (service_role — NUNCA commitar no código)
#   CONTAAZUL_CLIENT_ID
#   CONTAAZUL_CLIENT_SECRET
#   CISPAY_TOKEN           (ou as credenciais que o script usa)

name: Sync diário

on:
  schedule:
    - cron: '0 9 * * *'      # 09:00 UTC = 06:00 em Salvador
  workflow_dispatch:          # permite rodar manualmente pelo site do GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil
          # se houver requirements.txt em etl/, use:
          # pip install -r etl/requirements.txt

      - name: Conta Azul — contas a receber
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CONTAAZUL_CLIENT_ID: ${{ secrets.CONTAAZUL_CLIENT_ID }}
          CONTAAZUL_CLIENT_SECRET: ${{ secrets.CONTAAZUL_CLIENT_SECRET }}
        run: python etl/contaazul_sync.py --sync
        continue-on-error: true     # uma falha não impede as outras

      - name: Conta Azul — contas a pagar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CONTAAZUL_CLIENT_ID: ${{ secrets.CONTAAZUL_CLIENT_ID }}
          CONTAAZUL_CLIENT_SECRET: ${{ secrets.CONTAAZUL_CLIENT_SECRET }}
        run: python etl/contaazul_pagar_sync.py --sync
        continue-on-error: true

      - name: CisPay
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CISPAY_TOKEN: ${{ secrets.CISPAY_TOKEN }}
        run: python etl/cispay_sync.py
        continue-on-error: true
